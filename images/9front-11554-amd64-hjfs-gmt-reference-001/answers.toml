# Canonical reference-image profile for the verified 9front 11554 ISO.

schema = 1
installer_profile = "9front-11554-amd64-hjfs-gmt-v1"
iso_sha256 = "1dcfbb3ec221307329545a37d1562beeea1f4174f6df80d245e0a222893b3bb6"

[disk]
format = "qcow2"
size = "30G"
target = "sd00"
partition_table = "mbr"
use_entire_disk = true

[boot_console]
console = "0"
vgasize = "text"

[install]
filesystem = "hjfs"
hjfs_partition = "/dev/sd00/fs"
hjfs_cache_mib = 147
ream_filesystem = true
distribution_device = "/dev/sd01/data"
distribution_path = "/"
system_name = "cirno"
user = "glenda"
timezone = "GMT"

[network]
method = "automatic"

[boot_disk]
partition = "/dev/sd00/9fat"
install_plan9_mbr = true
mark_plan9_partition_active = true
